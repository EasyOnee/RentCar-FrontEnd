<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <!-- Page Header -->
            <div class="page-breadcrumb">
                <div class="d-md-flex align-items-center justify-content-between">
                    <h3 class="page-title">Listado de usuarios</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="javascript:void(0)">Componente</a></li>
                            <li class="breadcrumb-item active">Usuarios</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <div class="card mt-4">
                <div class="card-body">
                    <div class="row">
                        <!-- Toolbar -->
                        <p-toolbar class="mb-4 gap-2">
                            <ng-template pTemplate="left">
                                <button pButton label="Añadir nuevo" icon="bi bi-plus" class="p-button-success me-2" (click)="showDialog()"></button>
                            </ng-template>
                            
                            <ng-template pTemplate="right">
                                <button pButton pRipple label="Exportar CSV" icon="bi bi-download" class="p-button-info" pTooltip="CSV"></button>
                            </ng-template>
                        </p-toolbar>
                        
                        <!-- Table -->
                        <p-table #dt [columns]="cols" [value]="results" [paginator]="true" [rows]="10" [rowHover]="true" [rowsPerPageOptions]="[10, 25, 50]" [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} entradas">
                          <!-- Table Caption -->
                          <ng-template pTemplate="caption">
                            <div class="d-flex align-items-center justify-content-between">
                              <div class="input-group">
                                  <span class="input-group-text">
                                      <i class="bi bi-search"></i>
                                  </span>
                        
                                  <input type="text" class="form-control" placeholder="Buscar..." (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
                              </div>
                            </div>
                          </ng-template>
                        
                          <!-- Table Header -->
                          <ng-template pTemplate="header" let-columns>
                            <tr class="text-start text-muted fw-bolder fs-8 text-uppercase gs-0">
                              <th>
                                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                              </th>
                              <th *ngFor="let col of columns" pSortableColumn="{{ col.field }}">
                                {{ col.header }} <p-sortIcon field="{{ col.field }}"></p-sortIcon>
                              </th>
                              <th>Acciones</th>
                            </tr>
                          </ng-template>
                        
                          <!-- Table Body -->
                          <ng-template pTemplate="body" let-result let-index="rowIndex">
                            <tr class="odd" [pSelectableRow]="result.id">
                              <td>
                                <p-tableCheckbox [value]="result"></p-tableCheckbox>
                              </td>
                              <td>{{ result.email }}</td>
                              <td>{{ result.role }}</td>
                              <td>
                                <span [ngClass]="result.isActive === 'Activo' ? 'p-badge' : 'p-badge'" 
                                      [ngStyle]="{'background-color': result.isActive === 'Activo' ? '#28a745' : '#dc3545', 'color': 'white'}">
                                  {{ result.isActive }}
                                </span>
                              </td>
                              <td>{{ result.createdAt }}</td>
                              <td>{{ result.updatedAt }}</td>
                              <td>
                                  <div class="btn-group">
                                    <button pButton pRipple 
                                        label="{{ result.isActive === 'Activo' ? 'Desactivar' : 'Activar' }}" 
                                        [ngClass]="result.isActive === 'Activo' ? 'p-button-warning' : 'p-button-success'" 
                                        class="p-button-rounded me-2"
                                        (click)="toggleUserStatus(result)">
                                    </button>
                                    <button pButton pRipple icon="bi bi-pencil" class="p-button-rounded p-button-help me-2" (click)="editUser(result)"></button>
                                    <button pButton pRipple icon="bi bi-trash" class="p-button-rounded p-button-danger" (click)="confirmDelete(result)"></button>
                                  </div>
                              </td>
                            </tr>
                          </ng-template>
                        
                          <!-- Table Summary -->
                          <ng-template pTemplate="summary">
                            <div class="d-flex align-items-center justify-content-between">
                              Total de registros: {{ results ? results.length : 0 }}
                            </div>
                          </ng-template>
                        </p-table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div [ngClass]="{'modal-blur': isModalOpen}">
    <p-toast position="bottom-right"></p-toast>
    <p-dialog [header]="isEditMode ? 'Editar usuario' : 'Nuevo usuario'" [(visible)]="visible" [breakpoints]="{ '960px': '75vw' }" [style]="{ width: '25vw' }" [draggable]="false" [resizable]="false" (onHide)="hideDialog()">
        <form [formGroup]="form" (submit)="submit()">
            <div class="form-group">
                <label name="name" class="col-lg-4 col-form-label fw-bold fs-3">Nombre <i class="text-danger">*</i></label>
                <input type="text" placeholder="NOMBRE DE USUARIO" class="form-control" formControlName="name" id="name" name="name">
            </div>
            
            <br>

            <div class="form-group">
                <label name="email" class="col-lg-4 col-form-label fw-bold fs-3">Correo electrónico <i class="text-danger">*</i></label>
                <input type="email" placeholder="INGRESE CORREO ELECTRÓNICO" class="form-control" formControlName="email" id="email" name="email">
            </div>

            <br>

            <div class="form-group">
                <div class="row">
                    <div class="col">
                        <label name="password" class="col-form-label fw-bold fs-3">Contraseña <i class="text-danger">*</i></label>
                        <input type="password" placeholder="******" class="form-control" formControlName="password" id="password" name="password">
                    </div>

                    <div class="col">
                        <label name="role" class="col-form-label fw-bold fs-3">Rol <i class="text-danger">*</i></label>
                        <select class="form-control" formControlName="role" id="role" name="role">
                            <option value="" disabled selected>SELECCIONE UN ROL</option>
                            <option value="SUPERADMIN">SuperAdministrador</option>
                            <option value="ADMIN">Administrador</option>
                            <option value="AGENTE">Agente</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr>
            <div class="justify-content-end d-flex">
                <button type="submit" pButton label="Proceder" class="p-button-primary" icon="bi bi-check2" [disabled]="form.invalid || loading">
                    <span *ngIf="loading">Por favor, espere...</span>
                </button>
            </div>
        </form>
    </p-dialog>
</div>
